<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>English Learning</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;background:#f2f2f7;min-height:100vh;display:flex;justify-content:center}
.app{width:100%;max-width:430px;min-height:100vh;background:#fff;display:flex;flex-direction:column}
.statusbar{padding:14px 20px 0;display:flex;justify-content:space-between}
.statusbar span{font-size:13px;font-weight:600}
.header{padding:8px 20px 12px;display:flex;justify-content:space-between;align-items:center}
.header-title{font-size:22px;font-weight:700}
.streak{background:#fff3cd;color:#856404;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px}
.tabs{display:flex;margin:0 16px 16px;background:#f2f2f7;border-radius:10px;padding:3px;gap:3px}
.tab{flex:1;text-align:center;padding:7px 4px;font-size:12px;font-weight:500;color:#8e8e93;border-radius:8px;cursor:pointer}
.tab.active{background:#fff;color:#000;box-shadow:0 1px 3px rgba(0,0,0,.12)}
.body{flex:1;padding:0 16px 24px;display:flex;flex-direction:column;overflow-y:auto}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat{background:#f2f2f7;border-radius:12px;padding:12px;text-align:center}
.stat-n{font-size:24px;font-weight:700}
.stat-l{font-size:11px;color:#8e8e93;margin-top:2px}
.prog-wrap{height:4px;background:#f2f2f7;border-radius:2px;margin-bottom:12px}
.prog-fill{height:4px;border-radius:2px;transition:width .3s}
.article-wrap{margin-bottom:10px}
.article-badge{display:inline-flex;align-items:center;gap:5px;background:#f0f0ff;color:#5856d6;font-size:11px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid #d0cfff;max-width:100%;text-decoration:none;-webkit-tap-highlight-color:transparent}
.article-badge:hover{background:#e4e4ff}
.article-badge-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* 読み込み画面 */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;color:#8e8e93;font-size:14px}
.spinner{width:36px;height:36px;border:3px solid #e5e5ea;border-top-color:#5856d6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-err{color:#ff3b30;font-size:13px;text-align:center;padding:0 20px;line-height:1.6}
/* UNDERSTAND */
.fc-card{background:#fff;border:1px solid #e5e5ea;border-radius:20px;padding:24px 20px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:12px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s}
.fc-card:active{transform:scale(.98)}
.fc-phrase{font-size:20px;font-weight:600;text-align:center;line-height:1.4}
.fc-reveal{margin-top:14px;padding-top:14px;border-top:1px solid #e5e5ea;width:100%;display:none;flex-direction:column;gap:6px}
.fc-nuance{font-size:17px;font-weight:600;color:#1c1c1e;text-align:center;line-height:1.4}
.fc-transl{font-size:13px;color:#8e8e93;text-align:center}
.fc-ctx{font-size:12px;color:#8e8e93;text-align:center;background:#f9f9f9;border-radius:8px;padding:6px 10px;margin-top:2px}
.hint{font-size:12px;color:#c7c7cc;text-align:center;margin-bottom:10px}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.btn-again{background:#fff2f2;color:#ff3b30;border:1px solid #ffb3b0;border-radius:14px;padding:16px;font-size:15px;font-weight:600;text-align:center;cursor:pointer}
.btn-ok{background:#f0fff4;color:#1a7f37;border:1px solid #86efac;border-radius:14px;padding:16px;font-size:15px;font-weight:600;text-align:center;cursor:pointer}
.btn-next{border-radius:14px;padding:16px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;display:none;color:#fff;background:#5856d6}
.srs-note{font-size:12px;color:#c7c7cc;text-align:center;margin-top:8px;min-height:16px}
/* SPEAK */
.sp-ctx-box{background:#f9f9f9;border:1px solid #e5e5ea;border-radius:14px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:#636366;line-height:1.6}
.sp-phrase-box{background:#fff;border:1px solid #e5e5ea;border-radius:16px;padding:18px;margin-bottom:14px;font-size:18px;font-weight:500;line-height:1.9}
.sp-blank{display:inline-block;border-bottom:2.5px solid #5856d6;min-width:64px;text-align:center;color:#5856d6;font-weight:700;padding:0 4px;font-family:monospace;font-size:17px;letter-spacing:.05em}
.sp-blank.ok{background:#f0fff4;color:#1a7f37;border:none;border-radius:6px;padding:2px 8px;font-family:inherit;font-size:18px}
.sp-blank.ng{background:#fff2f2;color:#ff3b30;border:none;border-radius:6px;padding:2px 8px;font-family:inherit;font-size:18px}
.sp-nuance{font-size:17px;font-weight:600;color:#1c1c1e;margin-bottom:4px}
.sp-transl{font-size:13px;color:#8e8e93;margin-bottom:14px}
/* MISHEARING */
.mh-incorrect-label{font-size:12px;color:#ff6b35;font-weight:600;margin-bottom:6px}
.mh-incorrect-box{background:#fff5f2;border:1px solid #ffd4c2;border-radius:14px;padding:16px 18px;margin-bottom:16px;font-size:19px;font-weight:600;color:#cc3300;line-height:1.5;text-align:center}
.mh-correct-reveal{display:none;background:#f0fff4;border:1px solid #86efac;border-radius:12px;padding:12px 14px;font-size:15px;color:#1a7f37;margin-bottom:8px;font-weight:500}
.mh-correct-reveal.show{display:block}
/* 共通入力 */
.sp-input,.mh-input{width:100%;border:1.5px solid #e5e5ea;border-radius:12px;padding:13px 14px;font-size:17px;color:#000;background:#fff;outline:none;font-family:inherit;-webkit-appearance:none;transition:border-color .15s;margin-bottom:8px}
.sp-input:focus,.mh-input:focus{border-color:#5856d6}
.sp-input.ok,.mh-input.ok{border-color:#34c759;background:#f0fff4;color:#1a7f37}
.sp-input.ng,.mh-input.ng{border-color:#ff3b30;background:#fff2f2;color:#ff3b30}
.sp-ans,.mh-ans{font-size:13px;color:#ff3b30;font-weight:600;margin-bottom:8px;display:none}
.sp-ans.show,.mh-ans.show{display:block}
.btn-check,.btn-mh-check{border-radius:14px;padding:14px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;color:#fff;background:#5856d6;margin-bottom:8px}
.btn-check.disabled,.btn-mh-check.disabled{background:#c7c7cc;pointer-events:none}
.btn-sp-next,.btn-mh-next{border-radius:14px;padding:14px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;display:none;color:#fff;background:#30d158;margin-bottom:8px}
.sp-srs,.mh-srs{font-size:12px;color:#c7c7cc;text-align:center;min-height:16px}
/* 完了 */
.done{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 20px}
.done-icon{width:72px;height:72px;border-radius:50%;background:#f0fff4;border:2px solid #86efac;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px}
.done-title{font-size:22px;font-weight:700;margin-bottom:10px}
.done-sub{font-size:14px;color:#8e8e93;margin-bottom:28px;line-height:1.7;white-space:pre-line}
.done-btn{background:#5856d6;color:#fff;border-radius:14px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;display:inline-block}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="statusbar"><span id="clock">9:41</span><span>●●● 100%</span></div>
  <div class="header"><div class="header-title">English</div><div class="streak" id="streakBadge">0日 連続</div></div>
  <div class="tabs">
    <div class="tab active" id="tabU" onclick="switchTab('U')">Understand</div>
    <div class="tab" id="tabS" onclick="switchTab('S')">Speak</div>
    <div class="tab" id="tabM" onclick="switchTab('M')">Mishearing</div>
  </div>

  <!-- UNDERSTAND -->
  <div class="body" id="bodyU">
    <div class="loading" id="uLoading"><div class="spinner"></div><span>データを読み込み中...</span></div>
    <div id="uMain" class="hidden">
      <div class="stats">
        <div class="stat"><div class="stat-n" id="uToday">0</div><div class="stat-l">今日</div></div>
        <div class="stat"><div class="stat-n" id="uDue">0</div><div class="stat-l">復習待ち</div></div>
        <div class="stat"><div class="stat-n" id="uTotal">0</div><div class="stat-l">総数</div></div>
      </div>
      <div class="prog-wrap"><div class="prog-fill" id="fcProg" style="width:0%;background:#5856d6"></div></div>
      <div class="article-wrap" id="fcArticleWrap" style="display:none">
        <a class="article-badge" id="fcArticleLink" href="#" target="_blank" rel="noopener"><span>📰</span><span class="article-badge-text" id="fcArticle"></span></a>
      </div>
      <div class="fc-card" id="fcCard" onclick="revealFC()">
        <div class="fc-phrase" id="fcPhrase"></div>
        <div class="fc-reveal" id="fcReveal">
          <div class="fc-nuance" id="fcNuance"></div>
          <div class="fc-transl" id="fcTransl"></div>
          <div class="fc-ctx" id="fcCtx"></div>
        </div>
      </div>
      <div class="hint" id="fcHint">タップして意味を確認</div>
      <div class="btn-row" id="fcBtns" style="display:none">
        <div class="btn-again" onclick="answerFC(false)">もう一度</div>
        <div class="btn-ok" onclick="answerFC(true)">覚えた ✓</div>
      </div>
      <div class="btn-next" id="fcNext" onclick="nextFC()">次のカードへ</div>
      <div class="srs-note" id="fcSrsNote"></div>
      <div id="fcDone" class="hidden"><div class="done"><div class="done-icon">★</div><div class="done-title">セッション完了！</div><div class="done-sub" id="fcDoneSub"></div><div class="done-btn" onclick="restartFC()">もう一周する</div></div></div>
    </div>
  </div>

  <!-- SPEAK -->
  <div class="body hidden" id="bodyS">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sToday">0</div><div class="stat-l">今日</div></div>
      <div class="stat"><div class="stat-n" id="sScore">0</div><div class="stat-l">正解</div></div>
      <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">総数</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="spProg" style="width:0%;background:#30d158"></div></div>
    <div class="article-wrap" id="spArticleWrap" style="display:none">
      <a class="article-badge" id="spArticleLink" href="#" target="_blank" rel="noopener"><span>📰</span><span class="article-badge-text" id="spArticle"></span></a>
    </div>
    <div class="sp-ctx-box" id="spCtxBox"></div>
    <div class="sp-phrase-box" id="spPhraseBox"></div>
    <div class="sp-nuance" id="spNuance"></div>
    <div class="sp-transl" id="spTransl"></div>
    <input class="sp-input" id="spInput" type="text" placeholder="1単語を入力..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="sp-ans" id="spAns"></div>
    <div class="btn-check disabled" id="spCheckBtn" onclick="checkSp()">確認する</div>
    <div class="btn-sp-next" id="spNext" onclick="nextSp()">次の問題へ</div>
    <div class="sp-srs" id="spSrs"></div>
    <div id="spDone" class="hidden"><div class="done"><div class="done-icon">★</div><div class="done-title">セッション完了！</div><div class="done-sub" id="spDoneSub"></div><div class="done-btn" onclick="restartSp()">もう一周する</div></div></div>
  </div>

  <!-- MISHEARING -->
  <div class="body hidden" id="bodyM">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="mToday">0</div><div class="stat-l">今日</div></div>
      <div class="stat"><div class="stat-n" id="mScore">0</div><div class="stat-l">正解</div></div>
      <div class="stat"><div class="stat-n" id="mTotal">0</div><div class="stat-l">総数</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="mhProg" style="width:0%;background:#ff6b35"></div></div>
    <div class="article-wrap" id="mhArticleWrap" style="display:none">
      <a class="article-badge" id="mhArticleLink" href="#" target="_blank" rel="noopener"><span>📰</span><span class="article-badge-text" id="mhArticle"></span></a>
    </div>
    <div class="mh-incorrect-label">❌ 自分が聞き取った音</div>
    <div class="mh-incorrect-box" id="mhIncorrect"></div>
    <input class="mh-input" id="mhInput" type="text" placeholder="正しいフレーズを入力..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    <div class="mh-ans" id="mhAns"></div>
    <div class="mh-correct-reveal" id="mhReveal"></div>
    <div class="btn-mh-check disabled" id="mhCheckBtn" onclick="checkMh()">確認する</div>
    <div class="btn-mh-next" id="mhNext" onclick="nextMh()">次の問題へ</div>
    <div class="mh-srs" id="mhSrs"></div>
    <div id="mhDone" class="hidden"><div class="done"><div class="done-icon">★</div><div class="done-title">セッション完了！</div><div class="done-sub" id="mhDoneSub"></div><div class="done-btn" onclick="restartMh()">もう一周する</div></div></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbz3a3U7fti8AcqLmNbIiRwhXTtAQEJ5n6bHpwfC3mr3D5pGdldM2_XzqFyE3-fKz59byA/exec';
const SRS_KEY='eng_srs_v1', SESS_KEY='eng_sess_v1', SESS_DATE_KEY='eng_sess_date_v1', STREAK_KEY='eng_streak_v1';
const DATA_KEY='eng_gas_data_v1', DATA_TS_KEY='eng_gas_ts_v1';

let uCards=[], sCards=[], mCards=[];
let srs={}, sess={uToday:0,sToday:0,sScore:0,mToday:0,mScore:0};

function store(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function isDueU(c){const d=srs[c.phrase];return !d||d.due<=Date.now();}
function isDueS(c){const d=srs['s_'+c.phrase];return !d||d.due<=Date.now();}
function isDueM(c){const d=srs['m_'+c.correct];return !d||d.due<=Date.now();}
function updateSRS(key,ok){
  const d=srs[key]||{interval:1,ef:2.5,reps:0,due:0},q=ok?4:1;
  if(d.reps===0)d.interval=1;else if(d.reps===1)d.interval=6;else d.interval=Math.round(d.interval*d.ef);
  d.ef=Math.max(1.3,d.ef+0.1-(5-q)*(0.08+(5-q)*0.02));
  if(!ok){d.reps=0;d.interval=1;}else d.reps++;
  d.due=Date.now()+d.interval*86400000;srs[key]=d;store(SRS_KEY,srs);return d.interval;
}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// EST 5時以降かつ前回取得から23時間超で更新
function shouldUpdate(){
  const last=load(DATA_TS_KEY,0);
  const estHour=(new Date().getUTCHours()+24-5)%24;
  return Date.now()-last > 23*3600*1000 && estHour>=5;
}

async function loadData(){
  // キャッシュチェック
  const cached=load(DATA_KEY,null);
  if(cached && !shouldUpdate()){
    uCards=cached.u||[]; sCards=cached.s||[]; mCards=cached.m||[];
    return true;
  }
  // GASから取得
  try {
    const res = await fetch(GAS_URL);
    const data = await res.json();
    uCards=data.u||[]; sCards=data.s||[]; mCards=data.m||[];
    store(DATA_KEY,{u:uCards,s:sCards,m:mCards});
    store(DATA_TS_KEY,Date.now());
    return true;
  } catch(e) {
    // フォールバック：キャッシュがあれば使う
    if(cached){ uCards=cached.u||[]; sCards=cached.s||[]; mCards=cached.m||[]; return true; }
    return false;
  }
}

// STOPWORDS
const STOP=new Set(['a','an','the','is','are','was','were','be','been','being','have','has','had',
  'do','does','did','will','would','could','should','may','might','shall','must','can',
  'to','of','in','on','at','by','for','with','from','as','or','and','but','if','not',
  'this','that','these','those','it','its','my','your','our','their','his','her',
  'i','you','we','they','he','she','which','who','what','how','when','where','why',
  'up','out','into','over','about','after','before','just','also','so','more','than',
  'very','still','even','only','both','all','some','such','no','nor','yet','once',
  'near','vs','s','v','o','x','y','z','b','c']);
function alphaCore(w){return w.replace(/^[^a-zA-Z\u2019']+|[^a-zA-Z\u2019']+$/g,'').toLowerCase();}
function pickBlank(words){
  const scored=[];
  words.forEach((w,i)=>{
    const a=alphaCore(w).replace(/[\u2019']/g,'');
    if(!a||a.length<3||STOP.has(a)) return;
    scored.push({i,score:a.length+(a.length>=6?3:0)+(a.length>=9?3:0)});
  });
  scored.sort((a,b)=>b.score-a.score);
  const top3=scored.slice(0,3);
  if(!top3.length){for(let i=0;i<words.length;i++){if(alphaCore(words[i]).length>=2) return i;}return 0;}
  return top3[Math.floor(Math.random()*top3.length)].i;
}
function makeHint(w){
  const pre=w.match(/^[^a-zA-Z\u2019']*/)[0],suf=w.match(/[^a-zA-Z\u2019']*$/)[0];
  const core=w.slice(pre.length,w.length-(suf.length||0));
  return core?pre+core[0]+'_'.repeat(Math.max(core.length-1,2))+suf:w;
}
function normWord(w){return w.replace(/^[^a-zA-Z\u2019']+|[^a-zA-Z\u2019']+$/g,'').toLowerCase();}
function normFull(s){return s.toLowerCase().replace(/[\u2019']/g,"'").replace(/[^a-z'\s]/g,'').replace(/\s+/g,' ').trim();}

function setArticle(wrapId,linkId,textId,src,url){
  const aw=document.getElementById(wrapId);
  if(src){
    document.getElementById(textId).textContent=src;
    const lk=document.getElementById(linkId);
    lk.href=url||'#'; lk.style.pointerEvents=url?'auto':'none';
    aw.style.display='block';
  } else aw.style.display='none';
}

// ===== UNDERSTAND =====
let fcQ=[],fcIdx=0,fcRevealed=false;
function buildFC(){
  const due=uCards.filter(c=>isDueU(c)),newC=uCards.filter(c=>!srs[c.phrase]);
  fcQ=shuffle([...new Set([...due,...newC])]).slice(0,20);fcIdx=0;
  document.getElementById('uDue').textContent=due.length;
  document.getElementById('uTotal').textContent=uCards.length;
}
function showFC(){
  document.getElementById('fcDone').classList.add('hidden');
  document.getElementById('fcCard').style.display='flex';
  document.getElementById('fcHint').style.display='block';
  if(fcIdx>=fcQ.length){showFCDone();return;}
  const c=fcQ[fcIdx];fcRevealed=false;
  document.getElementById('fcPhrase').textContent=c.phrase;
  document.getElementById('fcNuance').textContent=c.nuance;
  document.getElementById('fcTransl').textContent=c.transl?'('+c.transl+')':'';
  document.getElementById('fcCtx').textContent=c.ctx?'文脈: '+c.ctx:'';
  document.getElementById('fcCtx').style.display=c.ctx?'block':'none';
  document.getElementById('fcReveal').style.display='none';
  document.getElementById('fcBtns').style.display='none';
  document.getElementById('fcNext').style.display='none';
  document.getElementById('fcSrsNote').textContent='';
  setArticle('fcArticleWrap','fcArticleLink','fcArticle',c.src,c.url);
  document.getElementById('fcProg').style.width=Math.round(fcIdx/Math.max(fcQ.length,1)*100)+'%';
}
function revealFC(){
  if(fcRevealed)return;fcRevealed=true;
  document.getElementById('fcReveal').style.display='flex';
  document.getElementById('fcBtns').style.display='grid';
  document.getElementById('fcHint').style.display='none';
}
function answerFC(ok){
  const c=fcQ[fcIdx],interval=updateSRS(c.phrase,ok);
  document.getElementById('fcBtns').style.display='none';
  document.getElementById('fcNext').style.display='block';
  document.getElementById('fcSrsNote').textContent=ok?'次の復習: '+(interval===1?'明日':interval+'日後'):'すぐに再出題します';
  if(ok){sess.uToday++;document.getElementById('uToday').textContent=sess.uToday;store(SESS_KEY,sess);}
}
function nextFC(){fcIdx++;showFC();}
function showFCDone(){
  document.getElementById('fcCard').style.display='none';document.getElementById('fcHint').style.display='none';
  document.getElementById('fcBtns').style.display='none';document.getElementById('fcNext').style.display='none';
  document.getElementById('fcDoneSub').textContent='今日 '+sess.uToday+' 枚 学習しました。\n明日も続けましょう！';
  document.getElementById('fcDone').classList.remove('hidden');
}
function restartFC(){document.getElementById('fcDone').classList.add('hidden');buildFC();showFC();}

// ===== SPEAK =====
let spQ=[],spIdx=0,spChecked=false,spWords=[],spBlankI=-1;
function buildSp(){
  const due=sCards.filter(c=>isDueS(c)),newC=sCards.filter(c=>!srs['s_'+c.phrase]);
  spQ=shuffle([...new Set([...due,...newC])]).slice(0,20);spIdx=0;
  document.getElementById('sTotal').textContent=sCards.length;
}
function renderPhrase(words,blankI,state){
  const box=document.getElementById('spPhraseBox');box.innerHTML='';
  words.forEach((w,i)=>{
    if(i>0) box.appendChild(document.createTextNode(' '));
    if(i===blankI){
      const s=document.createElement('span');
      s.className='sp-blank'+(state==='blank'?'':' '+(state==='ok'?'ok':'ng'));
      s.textContent=state==='blank'?makeHint(w):w;
      box.appendChild(s);
    }else box.appendChild(document.createTextNode(w));
  });
}
function showSp(){
  document.getElementById('spDone').classList.add('hidden');
  if(spIdx>=spQ.length){buildSp();if(!spQ.length){showSpDone();return;}}
  const c=spQ[spIdx];spChecked=false;
  setArticle('spArticleWrap','spArticleLink','spArticle',c.src,c.url);
  document.getElementById('spCtxBox').textContent=c.ctx||'';
  document.getElementById('spCtxBox').style.display=c.ctx?'block':'none';
  spWords=c.phrase.split(' ').filter(w=>w.length>0);spBlankI=pickBlank(spWords);
  renderPhrase(spWords,spBlankI,'blank');
  document.getElementById('spNuance').textContent=c.nuance||'';
  document.getElementById('spTransl').textContent=c.transl?'('+c.transl+')':'';
  const inp=document.getElementById('spInput');
  inp.value='';inp.className='sp-input';inp.disabled=false;
  document.getElementById('spCheckBtn').className='btn-check disabled';
  document.getElementById('spNext').style.display='none';
  document.getElementById('spSrs').textContent='';
  document.getElementById('spAns').className='sp-ans';
  document.getElementById('spProg').style.width=Math.round(spIdx/Math.max(spQ.length,1)*100)+'%';
  setTimeout(()=>inp.focus(),150);
}
function checkSp(){
  if(spChecked)return;
  const inp=document.getElementById('spInput'),val=inp.value.trim();
  if(!val)return;spChecked=true;inp.disabled=true;
  const target=spWords[spBlankI],ok=normWord(val)===normWord(target);
  inp.className='sp-input '+(ok?'ok':'ng');renderPhrase(spWords,spBlankI,ok?'ok':'ng');
  if(!ok){const a=document.getElementById('spAns');a.textContent='正解: '+target;a.className='sp-ans show';}
  document.getElementById('spCheckBtn').className='btn-check disabled';document.getElementById('spNext').style.display='block';
  const c=spQ[spIdx],interval=updateSRS('s_'+c.phrase,ok);
  document.getElementById('spSrs').textContent=ok?'次の復習: '+(interval===1?'明日':interval+'日後'):'すぐに再出題します';
  if(ok){sess.sScore++;document.getElementById('sScore').textContent=sess.sScore;}
  sess.sToday++;document.getElementById('sToday').textContent=sess.sToday;store(SESS_KEY,sess);
}
function nextSp(){spIdx++;showSp();}
function showSpDone(){document.getElementById('spDoneSub').textContent='正解 '+sess.sScore+' / '+sess.sToday+' 問\nお疲れ様でした！';document.getElementById('spDone').classList.remove('hidden');}
function restartSp(){document.getElementById('spDone').classList.add('hidden');buildSp();showSp();}

// ===== MISHEARING =====
let mhQ=[],mhIdx=0,mhChecked=false;
function buildMh(){
  const due=mCards.filter(c=>isDueM(c)),newC=mCards.filter(c=>!srs['m_'+c.correct]);
  mhQ=shuffle([...new Set([...due,...newC])]).slice(0,20);mhIdx=0;
  document.getElementById('mTotal').textContent=mCards.length;
}
function showMh(){
  document.getElementById('mhDone').classList.add('hidden');
  if(mhIdx>=mhQ.length){buildMh();if(!mhQ.length){showMhDone();return;}}
  const c=mhQ[mhIdx];mhChecked=false;
  setArticle('mhArticleWrap','mhArticleLink','mhArticle',c.src,c.url);
  document.getElementById('mhIncorrect').textContent=c.incorrect;
  const inp=document.getElementById('mhInput');
  inp.value='';inp.className='mh-input';inp.disabled=false;
  document.getElementById('mhCheckBtn').className='btn-mh-check disabled';
  document.getElementById('mhNext').style.display='none';
  document.getElementById('mhSrs').textContent='';
  document.getElementById('mhAns').className='mh-ans';
  document.getElementById('mhReveal').className='mh-correct-reveal';
  document.getElementById('mhProg').style.width=Math.round(mhIdx/Math.max(mhQ.length,1)*100)+'%';
  setTimeout(()=>inp.focus(),150);
}
function checkMh(){
  if(mhChecked)return;
  const inp=document.getElementById('mhInput'),val=inp.value.trim();
  if(!val)return;mhChecked=true;inp.disabled=true;
  const c=mhQ[mhIdx],ok=normFull(val)===normFull(c.correct);
  inp.className='mh-input '+(ok?'ok':'ng');
  if(!ok){
    document.getElementById('mhAns').textContent='正解: '+c.correct;
    document.getElementById('mhAns').className='mh-ans show';
    document.getElementById('mhReveal').textContent='✓ '+c.correct;
    document.getElementById('mhReveal').className='mh-correct-reveal show';
  }
  document.getElementById('mhCheckBtn').className='btn-mh-check disabled';
  document.getElementById('mhNext').style.display='block';
  const interval=updateSRS('m_'+c.correct,ok);
  document.getElementById('mhSrs').textContent=ok?'次の復習: '+(interval===1?'明日':interval+'日後'):'すぐに再出題します';
  if(ok){sess.mScore=(sess.mScore||0)+1;document.getElementById('mScore').textContent=sess.mScore;}
  sess.mToday=(sess.mToday||0)+1;document.getElementById('mToday').textContent=sess.mToday;
  store(SESS_KEY,sess);
}
function nextMh(){mhIdx++;showMh();}
function showMhDone(){document.getElementById('mhDoneSub').textContent='正解 '+sess.mScore+' / '+sess.mToday+' 問\nお疲れ様でした！';document.getElementById('mhDone').classList.remove('hidden');}
function restartMh(){document.getElementById('mhDone').classList.add('hidden');buildMh();showMh();}

// ===== 共通 =====
function switchTab(t){
  ['U','S','M'].forEach(x=>{
    document.getElementById('tab'+x).classList.toggle('active',x===t);
    document.getElementById('body'+x).classList.toggle('hidden',x!==t);
  });
}
function updateStreak(){
  const today=new Date().toDateString();
  let s=load(STREAK_KEY,{count:0,last:''});
  const yest=new Date(Date.now()-86400000).toDateString();
  if(s.last!==today){s.count=(s.last===yest)?s.count+1:1;s.last=today;store(STREAK_KEY,s);}
  document.getElementById('streakBadge').textContent=s.count+'日 連続';
}
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
document.getElementById('spInput').addEventListener('input',function(){document.getElementById('spCheckBtn').className='btn-check'+(this.value.trim()?'':' disabled');});
document.getElementById('spInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkSp();});
document.getElementById('mhInput').addEventListener('input',function(){document.getElementById('mhCheckBtn').className='btn-mh-check'+(this.value.trim()?'':' disabled');});
document.getElementById('mhInput').addEventListener('keydown',function(e){if(e.key==='Enter')checkMh();});

async function init(){
  updateClock();setInterval(updateClock,30000);
  srs=load(SRS_KEY,{});
  const defSess={uToday:0,sToday:0,sScore:0,mToday:0,mScore:0};
  sess=load(SESS_KEY,defSess);
  sess.mToday=sess.mToday||0;sess.mScore=sess.mScore||0;
  const today=new Date().toDateString();
  if(load(SESS_DATE_KEY,'')!==today){sess={...defSess};store(SESS_KEY,sess);store(SESS_DATE_KEY,today);}
  document.getElementById('uToday').textContent=sess.uToday;
  document.getElementById('sToday').textContent=sess.sToday;
  document.getElementById('sScore').textContent=sess.sScore;
  document.getElementById('mToday').textContent=sess.mToday;
  document.getElementById('mScore').textContent=sess.mScore;
  updateStreak();

  // GASからデータ取得
  const ok = await loadData();
  document.getElementById('uLoading').classList.add('hidden');
  if(!ok){
    document.getElementById('uMain').innerHTML='<div class="load-err">データの読み込みに失敗しました。<br>インターネット接続を確認して再読み込みしてください。</div>';
    document.getElementById('uMain').classList.remove('hidden');
    return;
  }
  document.getElementById('uMain').classList.remove('hidden');
  buildFC();showFC();buildSp();showSp();buildMh();showMh();
}
init();
</script>
